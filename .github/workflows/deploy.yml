name: Deploy Backend Ke EC2

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx numpy

      - name: Jalankan semua test
        run: python -m pytest tests/ -v --tb=short

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Menjalankan eksekusi SSH ke Server EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "1. Narik kode backend terbaru..."
            cd /home/ubuntu/syair/syair-be
            git pull origin main

            echo "2. Re-build dan Restart khusus layanan backend..."
            cd /home/ubuntu/syair

            docker compose up -d --build backend
